<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thank You</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card {
            background: white;
            width: 420px;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.25);
            animation: popIn 0.8s ease;
        }

        @keyframes popIn {
            from {
                transform: scale(0.7);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .icon {
            width: 90px;
            height: 90px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #43cea2, #185a9d);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 45px;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            padding: 12px 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        }

        .confetti {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image:
                radial-gradient(circle, #ffdd00 2px, transparent 2px),
                radial-gradient(circle, #ff4ecd 2px, transparent 2px),
                radial-gradient(circle, #00e5ff 2px, transparent 2px);
            background-size: 50px 50px;
            animation: confettiMove 12s linear infinite;
        }

        @keyframes confettiMove {
            from { background-position: 0 0; }
            to { background-position: 0 600px; }
        }
    </style>
</head>
<body>

<div class="confetti"></div>

<div class="card">
    <div class="icon">✓</div>
    <h1>Thank You!</h1>
    <p>
        Your submission has been received successfully.  
        We truly appreciate your time and effort.
    </p>
    <a href="registrationform.html" class="btn">Back to Home</a>
</div>

</body>
</html>
